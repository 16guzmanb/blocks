<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocks Character Builder</title>
    <style>
        /* Dark Mode & Drippy Punk Alt Aesthetic */
        body {
            background-color: #121212;
            color: #ff00ff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { text-transform: uppercase; letter-spacing: 2px; }
        h3 { margin: 0 0 8px 0; }

        .nav-buttons { margin-bottom: 20px; }

        button {
            background-color: #000;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            padding: 10px 20px;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
        }

        button:hover { background-color: #ff00ff; color: #000; }

        /* Highlighted / selected state for any button */
        button.active {
            background-color: #ff00ff;
            color: #000;
            box-shadow: 0 0 12px #ff00ff, 0 0 4px #ff00ff inset;
        }

        /* Container Layouts */
        .mode-container {
            display: none;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            justify-content: center;
        }

        .active-mode { display: flex; }

        /* Draw Mode */
        .canvas-area {
            width: 300px;
            height: 500px;
            border: 2px dashed #ff00ff;
            flex-shrink: 0;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .tools-panel, .parts-panel {
            background: #1e1e1e;
            padding: 15px;
            border: 1px solid #ff00ff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .parts-panel button,
        .tools-panel button {
            margin: 0;
        }

        .palette { display: flex; gap: 5px; flex-wrap: wrap; width: 120px; }

        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #333;
            transition: transform 0.1s, border-color 0.1s;
        }
        .color-swatch:hover   { transform: scale(1.15); }
        .color-swatch.active  { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 6px #fff; }

        /* Build Mode */
        .library, .shape-blocks {
            background: #1e1e1e;
            padding: 15px;
            border: 1px solid #ff00ff;
            width: 200px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .play-area {
            width: 500px;
            height: 600px;
            border: 3px solid #ff00ff;
            background-color: #0a0a0a;
            position: relative;
            overflow: hidden;
        }

        .draggable-item {
            width: 100px;
            height: auto;
            cursor: grab;
            position: absolute;
        }

        /* Shape/hat tiles in the panel — static layout, not absolute */
        .shape-item {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            user-select: none;
            transition: transform 0.1s, filter 0.1s;
            position: static;
            width: auto;
        }
        .shape-item:hover { transform: scale(1.1); filter: drop-shadow(0 0 6px #ff00ff); }
        .shape-item svg   { display: block; }

        .section-label {
            font-size: 10px;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
            margin: 6px 0 2px;
            border-top: 1px solid #333;
            padding-top: 6px;
        }

        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <h1>Character Maker</h1>

    <div class="nav-buttons">
        <button onclick="switchMode('draw')">Draw Mode</button>
        <button onclick="switchMode('build')">Build Mode</button>
    </div>

    <!-- ═══════════════════ DRAW MODE ═══════════════════ -->
    <div id="draw-mode" class="mode-container active-mode">

        <div class="parts-panel">
            <h3>Select Part</h3>
            <!-- data-index matches the parts[] array below -->
            <button class="part-btn active" data-index="0" onclick="selectPart(0)">Head</button>
            <button class="part-btn"        data-index="1" onclick="selectPart(1)">Left Arm</button>
            <button class="part-btn"        data-index="2" onclick="selectPart(2)">Right Arm</button>
            <button class="part-btn"        data-index="3" onclick="selectPart(3)">Legs</button>
            <button class="part-btn"        data-index="4" onclick="selectPart(4)">Torso</button>
        </div>

        <!-- Single display canvas — all parts composited here -->
        <div class="canvas-area">
            <canvas id="drawingCanvas" width="300" height="500"></canvas>
        </div>

        <div class="tools-panel">
            <h3>Tools</h3>
            <button class="tool-btn active" data-tool="draw"   onclick="setTool('draw')">Brush</button>
            <button class="tool-btn"        data-tool="fill"   onclick="setTool('fill')">Paint Bucket</button>
            <button class="tool-btn"        data-tool="eraser" onclick="setTool('eraser')">Eraser</button>
            <button onclick="clearCurrentPart()" style="border-color:#ff4444;color:#ff4444;margin-top:4px;">Clear Part</button>

            <h3>Palette</h3>
            <div class="palette">
                <div class="color-swatch active" style="background:#ff00ff;" onclick="setColor('#ff00ff',this)"></div>
                <div class="color-swatch"        style="background:#00ffff;" onclick="setColor('#00ffff',this)"></div>
                <div class="color-swatch"        style="background:#ff0000;" onclick="setColor('#ff0000',this)"></div>
                <div class="color-swatch"        style="background:#00ff00;" onclick="setColor('#00ff00',this)"></div>
                <div class="color-swatch"        style="background:#ffff00;" onclick="setColor('#ffff00',this)"></div>
                <div class="color-swatch"        style="background:#ff8800;" onclick="setColor('#ff8800',this)"></div>
                <div class="color-swatch"        style="background:#8800ff;" onclick="setColor('#8800ff',this)"></div>
                <div class="color-swatch"        style="background:#ffffff;" onclick="setColor('#ffffff',this)"></div>
                <div class="color-swatch"        style="background:#888888;" onclick="setColor('#888888',this)"></div>
                <div class="color-swatch"        style="background:#000000; border-color:#444;" onclick="setColor('#000000',this)"></div>
            </div>

            <button onclick="saveCharacter()" style="margin-top:20px;">Save Character</button>
        </div>
    </div>

    <!-- ═══════════════════ BUILD MODE ═══════════════════ -->
    <div id="build-mode" class="mode-container">
        <div class="library" id="saved-library">
            <h3>Your Library</h3>
        </div>

        <div class="play-area" id="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
        </div>

        <div class="shape-blocks" id="raw-blocks">
            <h3>Blocks &amp; Hats</h3>

            <div class="section-label">Shapes</div>

            <!-- Square -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-square">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="4" width="52" height="52" fill="#ff00ff" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>
            <!-- Circle -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-circle">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="26" fill="#00ffff" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>
            <!-- Triangle -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-triangle">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="30,4 56,56 4,56" fill="#ff8800" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>
            <!-- Diamond -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-diamond">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="30,4 56,30 30,56 4,30" fill="#8800ff" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>
            <!-- Star -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-star">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="30,4 36,22 56,22 40,34 46,54 30,42 14,54 20,34 4,22 24,22"
                             fill="#ffff00" stroke="#fff" stroke-width="1.5"/>
                </svg>
            </div>
            <!-- Hexagon -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-hex">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="30,4 54,17 54,43 30,56 6,43 6,17"
                             fill="#00ff00" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>
            <!-- Cross / Plus -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-cross">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <rect x="22" y="4"  width="16" height="52" fill="#ff0055" stroke="#fff" stroke-width="1.5"/>
                    <rect x="4"  y="22" width="52" height="16" fill="#ff0055" stroke="#fff" stroke-width="1.5"/>
                </svg>
            </div>
            <!-- Lightning bolt -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-bolt">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="36,4 18,32 30,32 24,56 42,28 30,28"
                             fill="#ffff00" stroke="#fff" stroke-width="1.5"/>
                </svg>
            </div>
            <!-- Heart -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-heart">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30 52 C30 52 6 36 6 20 A12 12 0 0 1 30 16 A12 12 0 0 1 54 20 C54 36 30 52 30 52Z"
                          fill="#ff0055" stroke="#fff" stroke-width="1.5"/>
                </svg>
            </div>
            <!-- Skull -->
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="s-skull">
                <svg width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="30" cy="24" rx="20" ry="18" fill="#eee" stroke="#555" stroke-width="1.5"/>
                    <rect x="16" y="38" width="28" height="14" rx="3" fill="#eee" stroke="#555" stroke-width="1.5"/>
                    <rect x="20" y="42" width="6"  height="8" rx="1" fill="#555"/>
                    <rect x="34" y="42" width="6"  height="8" rx="1" fill="#555"/>
                    <circle cx="22" cy="24" r="5" fill="#555"/>
                    <circle cx="38" cy="24" r="5" fill="#555"/>
                    <rect x="27" y="28" width="6" height="3" rx="1" fill="#555"/>
                </svg>
            </div>

            <div class="section-label">Hats &amp; Accessories</div>

            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-tophat"   style="font-size:40px;">🎩</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-crown"    style="font-size:40px;">👑</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-grad"     style="font-size:40px;">🎓</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-cap"      style="font-size:40px;">🧢</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-helmet"   style="font-size:40px;">⛑️</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-witch"    style="font-size:40px;">🧙</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-glasses"  style="font-size:40px;">🕶️</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-bow"      style="font-size:40px;">🎀</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-chain"    style="font-size:40px;">⛓️</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-spider"   style="font-size:40px;">🕷️</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-lightning" style="font-size:40px;">⚡</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-fire"     style="font-size:40px;">🔥</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-skull2"   style="font-size:40px;">💀</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-rose"     style="font-size:40px;">🥀</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-moon"     style="font-size:40px;">🌙</div>
            <div class="shape-item draggable-item" draggable="true" ondragstart="drag(event)" id="h-bat"      style="font-size:40px;">🦇</div>

            <button onclick="yeetAll()" style="margin-top:auto;border-color:red;color:red;">Yeet Reset</button>
        </div>
    </div>

    <script>
    /* ─────────────────────────────────────────────────────────
       CONSTANTS & STATE
    ───────────────────────────────────────────────────────── */
    const CANVAS_W = 300, CANVAS_H = 500;

    // Parts: odd = blank/mask template, even = outline overlay
    const parts = [
        { name: 'Head',      blank: 'block (1).png',  outline: 'block (2).png'  },
        { name: 'Left Arm',  blank: 'block (3).png',  outline: 'block (4).png'  },
        { name: 'Right Arm', blank: 'block (5).png',  outline: 'block (6).png'  },
        { name: 'Legs',      blank: 'block (7).png',  outline: 'block (8).png'  },
        { name: 'Torso',     blank: 'block (9).png',  outline: 'block (10).png' },
    ];

    // One offscreen canvas per part — holds the painted pixels for that part
    const partCanvases = parts.map(() => {
        const c = document.createElement('canvas');
        c.width = CANVAS_W;
        c.height = CANVAS_H;
        return c;
    });

    let blankImages   = [];   // loaded Image objects for masks   (odd PNGs)
    let outlineImages = [];   // loaded Image objects for outlines (even PNGs)

    let currentPartIndex = 0;
    let currentTool  = 'draw';
    let currentColor = '#ff00ff';
    let isDrawing    = false;
    let lastX = 0, lastY = 0;

    const displayCanvas = document.getElementById('drawingCanvas');
    const displayCtx    = displayCanvas.getContext('2d');

    /* ─────────────────────────────────────────────────────────
       IMAGE LOADING & INIT
    ───────────────────────────────────────────────────────── */
    function loadImage(src) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload  = () => resolve(img);
            img.onerror = () => resolve(null);   // graceful — missing files won't crash
            img.src = src;
        });
    }

    async function init() {
        [blankImages, outlineImages] = await Promise.all([
            Promise.all(parts.map(p => loadImage(p.blank))),
            Promise.all(parts.map(p => loadImage(p.outline)))
        ]);

        // Paint each part's blank template onto its offscreen canvas.
        // source-atop later will clip drawing to these pixels.
        parts.forEach((_, i) => {
            if (!blankImages[i]) return;
            const pCtx = partCanvases[i].getContext('2d');
            pCtx.drawImage(blankImages[i], 0, 0, CANVAS_W, CANVAS_H);
        });

        renderAll();

        // Restore build state if present
        const saved = localStorage.getItem('buildState');
        if (saved) document.getElementById('drop-zone').innerHTML = saved;
    }

    /* ─────────────────────────────────────────────────────────
       RENDERING — composites ALL parts + ALL outlines onto
       the single visible canvas every time something changes.
    ───────────────────────────────────────────────────────── */
    function renderAll() {
        displayCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);

        // 1. Draw every part's painting layer (bottom → top)
        partCanvases.forEach(pc => displayCtx.drawImage(pc, 0, 0));

        // 2. Draw every outline on top (keeps linework crisp over the colour)
        outlineImages.forEach(img => {
            if (img) displayCtx.drawImage(img, 0, 0, CANVAS_W, CANVAS_H);
        });
    }

    /* ─────────────────────────────────────────────────────────
       PART / TOOL / COLOUR SELECTION
    ───────────────────────────────────────────────────────── */
    function selectPart(index) {
        currentPartIndex = index;
        document.querySelectorAll('.part-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === index);
        });
    }

    function setTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tool === tool);
        });
    }

    function setColor(color, el) {
        currentColor = color;
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        if (el) el.classList.add('active');
    }

    /* ─────────────────────────────────────────────────────────
       DRAWING — all ops use source-atop so pixels are only
       placed where the blank template already has opaque pixels.
       This keeps drawing/fill inside the mask shape.
    ───────────────────────────────────────────────────────── */
    displayCanvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        lastX = e.offsetX;
        lastY = e.offsetY;

        if (currentTool === 'fill') {
            const pCtx = partCanvases[currentPartIndex].getContext('2d');
            pCtx.save();
            pCtx.globalCompositeOperation = 'source-atop'; // clipped to mask shape
            pCtx.fillStyle = currentColor;
            pCtx.fillRect(0, 0, CANVAS_W, CANVAS_H);
            pCtx.restore();
            renderAll();
            isDrawing = false;
        }
    });

    displayCanvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        if (currentTool !== 'draw' && currentTool !== 'eraser') return;

        const pCtx = partCanvases[currentPartIndex].getContext('2d');
        pCtx.save();

        if (currentTool === 'eraser') {
            // destination-out punches transparent holes — erases back to the blank template colour
            pCtx.globalCompositeOperation = 'destination-out';
            pCtx.strokeStyle = 'rgba(0,0,0,1)';
        } else {
            pCtx.globalCompositeOperation = 'source-atop'; // clipped to mask shape
            pCtx.strokeStyle = currentColor;
        }

        pCtx.lineWidth = currentTool === 'eraser' ? 18 : 5;
        pCtx.lineCap   = 'round';
        pCtx.lineJoin  = 'round';
        pCtx.beginPath();
        pCtx.moveTo(lastX, lastY);
        pCtx.lineTo(e.offsetX, e.offsetY);
        pCtx.stroke();
        pCtx.restore();

        // After erasing, re-stamp the blank template so the shape stays opaque
        // (eraser removes colour but keeps the template pixels intact)
        if (currentTool === 'eraser' && blankImages[currentPartIndex]) {
            const pCtx2 = partCanvases[currentPartIndex].getContext('2d');
            pCtx2.save();
            pCtx2.globalCompositeOperation = 'destination-over'; // paint behind existing pixels
            pCtx2.drawImage(blankImages[currentPartIndex], 0, 0, CANVAS_W, CANVAS_H);
            pCtx2.restore();
        }

        lastX = e.offsetX;
        lastY = e.offsetY;
        renderAll();
    });

    displayCanvas.addEventListener('mouseup',    () => { isDrawing = false; });
    displayCanvas.addEventListener('mouseleave', () => { isDrawing = false; });

    /* ─────────────────────────────────────────────────────────
       CLEAR current part back to its blank template
    ───────────────────────────────────────────────────────── */
    function clearCurrentPart() {
        const pCtx = partCanvases[currentPartIndex].getContext('2d');
        pCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        if (blankImages[currentPartIndex]) {
            pCtx.drawImage(blankImages[currentPartIndex], 0, 0, CANVAS_W, CANVAS_H);
        }
        renderAll();
    }

    /* ─────────────────────────────────────────────────────────
       SAVE CHARACTER — composites ALL parts + outlines into
       one single image and pushes it to the library.
    ───────────────────────────────────────────────────────── */
    function saveCharacter() {
        const tmp  = document.createElement('canvas');
        tmp.width  = CANVAS_W;
        tmp.height = CANVAS_H;
        const tCtx = tmp.getContext('2d');

        // Paint layers: all part canvases first, then all outlines on top
        partCanvases.forEach(pc => tCtx.drawImage(pc, 0, 0));
        outlineImages.forEach(img => { if (img) tCtx.drawImage(img, 0, 0, CANVAS_W, CANVAS_H); });

        const dataUrl   = tmp.toDataURL('image/png');
        const savedParts = JSON.parse(localStorage.getItem('savedParts') || '[]');
        savedParts.push(dataUrl);
        localStorage.setItem('savedParts', JSON.stringify(savedParts));
        alert('Character saved to Library!');
    }

    function loadLibrary() {
        const lib = document.getElementById('saved-library');
        lib.innerHTML = '<h3>Your Library</h3>';
        const savedParts = JSON.parse(localStorage.getItem('savedParts') || '[]');

        savedParts.forEach((src, index) => {
            const img = document.createElement('img');
            img.src       = src;
            img.className = 'draggable-item';
            img.draggable = true;
            img.id        = 'saved-' + index;
            img.ondragstart = drag;
            img.style.position = 'static';
            lib.appendChild(img);
        });
    }

    /* ─────────────────────────────────────────────────────────
       MODE SWITCHING
    ───────────────────────────────────────────────────────── */
    function switchMode(mode) {
        document.getElementById('draw-mode').classList.remove('active-mode');
        document.getElementById('build-mode').classList.remove('active-mode');
        document.getElementById(`${mode}-mode`).classList.add('active-mode');
        if (mode === 'build') loadLibrary();
    }

    /* ─────────────────────────────────────────────────────────
       BUILD MODE: DRAG & DROP
    ───────────────────────────────────────────────────────── */
    function allowDrop(ev) { ev.preventDefault(); }

    function drag(ev) {
        ev.dataTransfer.setData('text', ev.target.id);
        const rect = ev.target.getBoundingClientRect();
        ev.dataTransfer.setData('offsetX', ev.clientX - rect.left);
        ev.dataTransfer.setData('offsetY', ev.clientY - rect.top);
    }

    function drop(ev) {
        ev.preventDefault();
        const id       = ev.dataTransfer.getData('text');
        const original = document.getElementById(id);

        let el = original;
        if (original.parentElement.id !== 'drop-zone') {
            el    = original.cloneNode(true);
            el.id = id + '-clone-' + Math.random();
        }

        const zoneRect = document.getElementById('drop-zone').getBoundingClientRect();
        el.style.position = 'absolute';
        // Shape/hat items from the panel need a fixed size once on the canvas
        if (el.classList.contains('shape-item')) {
            el.style.width  = 'auto';
            el.style.height = 'auto';
        }
        el.style.left = (ev.clientX - zoneRect.left  - parseInt(ev.dataTransfer.getData('offsetX'))) + 'px';
        el.style.top  = (ev.clientY - zoneRect.top   - parseInt(ev.dataTransfer.getData('offsetY'))) + 'px';
        el.onclick = function () { this.style.zIndex = Date.now(); };

        ev.target.appendChild(el);
        saveBuildState();
    }

    function yeetAll() {
        document.getElementById('drop-zone').innerHTML = '';
        localStorage.removeItem('buildState');
    }

    function saveBuildState() {
        localStorage.setItem('buildState', document.getElementById('drop-zone').innerHTML);
    }

    /* ─────────────────────────────────────────────────────────
